<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>福斯保經 — 線上簽署管理後台</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f5f7fa;
}

/* 上方藍條 */
.topbar {
  background: #2c5f87;
  color: white;
  padding: 22px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 600;
  letter-spacing: 1px;
}

.topbar .right {
  background: rgba(255,255,255,0.2);
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 14px;
}

/* 中間區 */
.container {
  max-width: 900px;
  margin: 60px auto;
}

/* 卡片 */
.card {
  background: white;
  padding: 40px;
  border-radius: 14px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.06);
}

/* 綠提示 */
.success {
  background: #e8f5ec;
  border: 1px solid #bfe3cc;
  padding: 16px;
  border-radius: 10px;
  margin-bottom: 25px;
  color: #2e7d4f;
}

/* 上傳區 */
.upload {
  border: 2px dashed #cfcfcf;
  border-radius: 12px;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #8a8a8a;
  margin-bottom: 30px;
  font-size: 14px;
}

/* 按鈕 */
.btn {
  background: #6c8ea4;
  color: white;
  padding: 12px 26px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 14px;
}
</style>

</head>

<body>

<div class="topbar">
  <div>VOLKSWAGEN INSURANCE BROKERS</div>
  <div class="right">業務端</div>
</div>

<div class="container">
  <div class="card">

    <h3 style="margin-bottom:20px;">上傳要保書並產生簽署連結</h3>

    <div class="success">
      ✔ 福斯保經制式文件已自動加入，簽名區已預設完成
    </div>

    <div class="upload">
      點擊或拖曳圖片至此
    </div>

    <button class="btn">產生簽署連結</button>

  </div>
</div>

</body>
</html>
