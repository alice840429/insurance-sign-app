<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>福斯保經 — 線上簽署管理後台</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
        "Microsoft JhengHei", sans-serif;
      background: #f3f5f7;
      color: #1f2937;
    }

    .topbar {
      background: #1f5d8f;
      color: #fff;
      padding: 18px 24px;
    }

    .topbar-inner {
      max-width: 1220px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .brand-main {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: 0.2px;
    }

    .brand-sub {
      margin-top: 4px;
      font-size: 13px;
      opacity: 0.95;
    }

    .staff-chip {
      background: rgba(255,255,255,0.14);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .page {
      max-width: 930px;
      margin: 34px auto;
      padding: 0 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 28px 28px 30px;
      box-shadow: 0 2px 12px rgba(15, 23, 42, 0.06);
    }

    .title {
      margin: 0 0 20px;
      font-size: 20px;
      font-weight: 800;
      color: #16324f;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .success-banner {
      background: #e9f5eb;
      color: #2f7d48;
      border: 1px solid #b7ddb9;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .field-label {
      font-size: 14px;
      color: #4b5563;
      margin-bottom: 10px;
    }

    .dropzone {
      border: 2px dashed #cfd4da;
      border-radius: 14px;
      min-height: 188px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      cursor: pointer;
      background: #fff;
      transition: 0.18s ease;
      user-select: none;
      padding: 18px;
    }

    .dropzone:hover,
    .dropzone.dragover {
      border-color: #8eb0c9;
      background: #f7fbff;
    }

    .dropzone-icon {
      font-size: 44px;
      line-height: 1;
      margin-bottom: 10px;
      color: #6b7280;
    }

    .dropzone-main {
      font-size: 16px;
      font-weight: 700;
      color: #4b5563;
      margin-bottom: 6px;
    }

    .dropzone-sub {
      font-size: 13px;
      color: #9ca3af;
    }

    .dropzone input {
      display: none;
    }

    .file-list {
      list-style: none;
      padding: 0;
      margin: 14px 0 0;
    }

    .file-list li {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      color: #374151;
      margin-bottom: 8px;
      word-break: break-all;
    }

    .bottom-actions {
      margin-top: 18px;
    }

    .generate-btn {
      background: #6c8ea4;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .generate-btn:hover {
      filter: brightness(0.97);
    }

    .generate-btn:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .result-panel {
      display: none;
      margin-top: 22px;
      border-top: 1px solid #e5e7eb;
      padding-top: 20px;
    }

    .result-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 14px;
      color: #16324f;
    }

    .result-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .result-label {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #374151;
    }

    .result-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .result-row input {
      flex: 1 1 340px;
      min-width: 0;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      background: #fff;
    }

    .mini-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #334155;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    @media (max-width: 640px) {
      .topbar-inner {
        align-items: flex-start;
        gap: 12px;
      }
      .brand-main {
        font-size: 16px;
      }
      .card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="brand-main">VOLKSWAGEN INSURANCE BROKERS</div>
        <div class="brand-sub">福斯保經 — 線上簽署管理後台</div>
      </div>
      <div class="staff-chip">👤 業務端</div>
    </div>
  </header>

  <main class="page">
    <section class="card">
      <h1 class="title">📄 上傳要保書並產生簽署連結</h1>

      <div class="success-banner">
        ✅ 福斯保經制式文件（書面分析評估暨業務員報告書、瞭解要保人需求報告書、個人資料蒐集處理同意書）已自動加入，簽名區也已預設完成。
      </div>

      <div class="field-label">上傳要保書圖片（ JPG / PNG ），可多選：</div>

      <label class="dropzone" id="dropzone" for="fileInput">
        <div class="dropzone-icon">📄</div>
        <div class="dropzone-main">點擊或拖曳圖片至此</div>
        <div class="dropzone-sub">支援 JPG / PNG・可多選</div>
        <input id="fileInput" type="file" accept="image/png,image/jpeg" multiple />
      </label>

      <ul id="fileList" class="file-list"></ul>

      <div class="bottom-actions">
        <button id="generateBtn" class="generate-btn">✅ 產生簽署連結</button>
      </div>

      <div id="result" class="result-panel">
        <div class="result-title">簽署連結已建立</div>

        <div class="result-box">
          <div class="result-label">客戶簽名連結（傳給客戶）</div>
          <div class="result-row">
            <input id="signerUrl" readonly />
            <button class="mini-btn" data-copy="signerUrl" type="button">複製</button>
            <a id="signerOpen" class="mini-btn" target="_blank" rel="noopener">開啟</a>
          </div>
        </div>

        <div class="result-box">
          <div class="result-label">業務下載連結（客戶簽完後下載 PDF）</div>
          <div class="result-row">
            <input id="downloadUrl" readonly />
            <button class="mini-btn" data-copy="downloadUrl" type="button">複製</button>
            <a id="downloadOpen" class="mini-btn" target="_blank" rel="noopener">下載</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const generateBtn = document.getElementById('generateBtn');
    const result = document.getElementById('result');
    const signerUrl = document.getElementById('signerUrl');
    const downloadUrl = document.getElementById('downloadUrl');
    const signerOpen = document.getElementById('signerOpen');
    const downloadOpen = document.getElementById('downloadOpen');
    const dropzone = document.getElementById('dropzone');

    function renderFiles() {
      fileList.innerHTML = '';
      const files = [...fileInput.files];
      files.forEach(file => {
        const li = document.createElement('li');
        li.textContent = file.name;
        fileList.appendChild(li);
      });
    }

    function setFiles(files) {
      const dt = new DataTransfer();
      [...files].forEach(file => dt.items.add(file));
      fileInput.files = dt.files;
      renderFiles();
    }

    fileInput.addEventListener('change', renderFiles);

    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });

    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('dragover');
    });

    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files && e.dataTransfer.files.length) {
        setFiles(e.dataTransfer.files);
      }
    });

    generateBtn.addEventListener('click', async () => {
      const formData = new FormData();
      [...fileInput.files].forEach(file => formData.append('uploadedForms', file));

      generateBtn.disabled = true;
      generateBtn.textContent = '產生中...';

      try {
        const res = await fetch('/api/cases', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();

        if (!data.ok) throw new Error(data.message || '建立失敗');

        signerUrl.value = data.signerUrl;
        downloadUrl.value = data.downloadUrl;
        signerOpen.href = data.signerUrl;
        downloadOpen.href = data.downloadUrl;
        result.style.display = 'block';
        result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      } catch (err) {
        alert(err.message || '建立失敗');
      } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = '✅ 產生簽署連結';
      }
    });

    document.querySelectorAll('[data-copy]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const target = document.getElementById(btn.dataset.copy);
        try {
          await navigator.clipboard.writeText(target.value);
          const original = btn.textContent;
          btn.textContent = '已複製';
          setTimeout(() => btn.textContent = original, 1200);
        } catch {
          alert('複製失敗，請手動複製');
        }
      });
    });
  </script>
</body>
</html>
