<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>福斯保經 — 業務後台</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .fig1-dropzone.dragover {
      border-color: #7da5c2;
      background: #eef5fb;
    }
    .fig1-dropzone input {
      display: none;
    }
  </style>
</head>
<body class="dashboard-body fig1-body">
  <header class="fig1-topbar">
    <div class="fig1-topbar-inner">
      <div class="brand-block">
        <div class="brand-main">VOLKSWAGEN INSURANCE BROKERS</div>
        <div class="brand-sub">福斯保經 — 線上簽署管理後台</div>
      </div>
      <div class="staff-chip">👤 業務端</div>
    </div>
  </header>

  <main class="fig1-main-wrap">
    <section class="fig1-upload-card">
      <h1 class="fig1-upload-title">📄 上傳要保書並產生簽署連結</h1>

      <div class="success-banner always-show fig1-success-banner">
        ✅ 福斯保經制式文件（書面分析評估暨業務員報告書、瞭解要保人需求報告書、個人資料蒐集處理同意書）已自動加入，簽名區也已預設完成。
      </div>

      <div class="field-label fig1-field-label">上傳要保書圖片（ JPG / PNG ），可多選：</div>

      <label class="big-dropzone fig1-dropzone" id="dropzone" for="fileInput">
        <div class="dropzone-icon fig1-dropzone-icon">📄</div>
        <div class="dropzone-main fig1-dropzone-main">點擊或拖曳圖片至此</div>
        <div class="dropzone-sub fig1-dropzone-sub">支援 JPG / PNG・可多選</div>
        <input id="fileInput" type="file" accept="image/png,image/jpeg" multiple />
      </label>

      <ul id="fileList" class="file-list compact"></ul>

      <div class="bottom-actions fig1-bottom-actions">
        <button id="generateBtn" class="primary-generate-btn fig1-generate-btn">✅ 產生簽署連結</button>
      </div>

      <div id="result" class="result-panel fig1-result-panel">
        <div class="result-title">簽署連結已建立</div>

        <div class="result-box">
          <div class="result-label">客戶簽名連結（傳給客戶）</div>
          <div class="result-row">
            <input id="signerUrl" readonly />
            <button class="mini-btn" data-copy="signerUrl">複製</button>
            <a id="signerOpen" class="mini-btn" target="_blank">開啟</a>
          </div>
        </div>

        <div class="result-box">
          <div class="result-label">業務下載連結（客戶簽完後下載 PDF）</div>
          <div class="result-row">
            <input id="downloadUrl" readonly />
            <button class="mini-btn" data-copy="downloadUrl">複製</button>
            <a id="downloadOpen" class="mini-btn" target="_blank">下載</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const generateBtn = document.getElementById('generateBtn');
    const result = document.getElementById('result');
    const signerUrl = document.getElementById('signerUrl');
    const downloadUrl = document.getElementById('downloadUrl');
    const signerOpen = document.getElementById('signerOpen');
    const downloadOpen = document.getElementById('downloadOpen');
    const dropzone = document.getElementById('dropzone');

    function renderFiles() {
      fileList.innerHTML = '';
      const files = [...fileInput.files];
      if (!files.length) return;

      files.forEach(file => {
        const li = document.createElement('li');
        li.textContent = file.name;
        fileList.appendChild(li);
      });
    }

    function setFiles(files) {
      const dt = new DataTransfer();
      [...files].forEach(file => dt.items.add(file));
      fileInput.files = dt.files;
      renderFiles();
    }

    fileInput.addEventListener('change', renderFiles);

    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });

    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('dragover');
    });

    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files && e.dataTransfer.files.length) {
        setFiles(e.dataTransfer.files);
      }
    });

    generateBtn.addEventListener('click', async () => {
      const formData = new FormData();
      [...fileInput.files].forEach(file => formData.append('uploadedForms', file));

      generateBtn.disabled = true;
      generateBtn.textContent = '產生中...';

      try {
        const res = await fetch('/api/cases', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();

        if (!data.ok) throw new Error(data.message || '建立失敗');

        signerUrl.value = data.signerUrl;
        downloadUrl.value = data.downloadUrl;
        signerOpen.href = data.signerUrl;
        downloadOpen.href = data.downloadUrl;
        result.style.display = 'block';
        result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      } catch (err) {
        alert(err.message || '建立失敗');
      } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = '✅ 產生簽署連結';
      }
    });

    document.querySelectorAll('[data-copy]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const target = document.getElementById(btn.dataset.copy);
        await navigator.clipboard.writeText(target.value);
        const original = btn.textContent;
        btn.textContent = '已複製';
        setTimeout(() => btn.textContent = original, 1200);
      });
    });
  </script>
</body>
</html>
